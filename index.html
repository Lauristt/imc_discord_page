<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMC Prosperity · 策略情报</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --yellow:  #d29922;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --tag-bg:  #1f2937;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC',
                   sans-serif;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo span { color: var(--accent); }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
      display: inline-block;
      margin-right: 6px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .countdown {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .meta strong { color: var(--text); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: var(--accent); }

    .card-header {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ts {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .age {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    .card-body {
      padding: 14px 18px;
    }

    .insight {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      font-size: 14px;
      line-height: 1.6;
      border-bottom: 1px solid var(--border);
    }

    .insight:last-child { border-bottom: none; }

    .bullet {
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .channel-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 4px;
      margin-right: 6px;
      vertical-align: middle;
      white-space: nowrap;
    }

    .tag-algo    { background: #1c2d3a; color: #58a6ff; border: 1px solid #1f6feb; }
    .tag-manual  { background: #1a2d1a; color: #3fb950; border: 1px solid #238636; }
    .tag-general { background: #2d1a1a; color: #f78166; border: 1px solid #6e2626; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-size: 15px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #2d1a1a;
      border: 1px solid #6e2626;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 14px;
      color: #f78166;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">IMC <span>Prosperity</span> · 策略情报</div>
  <div class="status-bar">
    <span><span class="dot"></span>实时监控中</span>
    <span class="countdown" id="cd">60s</span>
    <span id="last-fetch">—</span>
  </div>
</header>

<main>
  <div class="meta">
    <span>数据来源：IMC Prosperity Discord（<strong>general · algo-trading · manual-trading</strong>）</span>
    <span>刷新间隔：<strong>60 秒</strong></span>
  </div>

  <div id="root">
    <div class="empty"><div class="spinner"></div>加载中…</div>
  </div>
</main>

<script>
const RAW_URL =
  'https://raw.githubusercontent.com/Lauristt/imc_discord_page/main/insights.md?t=';

function parseInsights(md) {
  const sections = md.split(/\n---\n/);
  const entries = [];

  for (const sec of sections) {
    const tsMatch = sec.match(/^##\s+(.+)$/m);
    if (!tsMatch) continue;
    const ts = tsMatch[1].trim();
    const bullets = [];
    for (const line of sec.split('\n')) {
      const m = line.match(/^-\s+(.+)$/);
      if (m) bullets.push(m[1].trim());
    }
    if (bullets.length) entries.push({ ts, bullets });
  }

  // newest first
  entries.sort((a, b) => b.ts.localeCompare(a.ts));
  return entries;
}

function tagHtml(text) {
  return text
    .replace(/#algo-trading[:：]?\s*/g,
      '<span class="channel-tag tag-algo">#algo-trading</span>')
    .replace(/#manual-trading[:：]?\s*/g,
      '<span class="channel-tag tag-manual">#manual-trading</span>')
    .replace(/#general[:：]?\s*/g,
      '<span class="channel-tag tag-general">#general</span>');
}

function timeAgo(tsStr) {
  try {
    const d = new Date(tsStr.replace(' ', 'T') + ':00');
    const diff = Math.floor((Date.now() - d) / 60000);
    if (diff < 1)  return '刚刚';
    if (diff < 60) return `${diff} 分钟前`;
    const h = Math.floor(diff / 60);
    if (h < 24)    return `${h} 小时前`;
    return `${Math.floor(h / 24)} 天前`;
  } catch { return ''; }
}

function render(entries) {
  const root = document.getElementById('root');
  if (!entries.length) {
    root.innerHTML = '<div class="empty">暂无见解记录</div>';
    return;
  }

  root.innerHTML = entries.map(e => `
    <div class="card">
      <div class="card-header">
        <span class="ts">📅 ${e.ts}</span>
        <span class="age">${timeAgo(e.ts)}</span>
      </div>
      <div class="card-body">
        ${e.bullets.map(b => `
          <div class="insight">
            <span class="bullet">›</span>
            <span>${tagHtml(escHtml(b))}</span>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function load() {
  try {
    const res = await fetch(RAW_URL + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const entries = parseInsights(text);
    render(entries);
    document.getElementById('last-fetch').textContent =
      '更新于 ' + new Date().toLocaleTimeString('zh-CN');
  } catch (err) {
    document.getElementById('root').innerHTML =
      `<div class="error-box">⚠️ 加载失败：${err.message}<br>
       网络正常的话，几秒后会自动重试。</div>`;
  }
}

// countdown + auto-refresh
let secs = 60;
function tick() {
  secs--;
  document.getElementById('cd').textContent = secs + 's';
  if (secs <= 0) {
    secs = 60;
    load();
  }
}
load();
setInterval(tick, 1000);
</script>
</body>
</html>
