<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMC Prosperity · 策略情报</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --yellow:  #d29922;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --tag-bg:  #1f2937;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC',
                   sans-serif;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo span { color: var(--accent); }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
      display: inline-block;
      margin-right: 6px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .countdown {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .meta strong { color: var(--text); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: var(--accent); }

    .card-header {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ts {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .age {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    .card-body {
      padding: 14px 18px;
    }

    .insight {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      font-size: 14px;
      line-height: 1.6;
      border-bottom: 1px solid var(--border);
    }

    .insight:last-child { border-bottom: none; }

    .bullet {
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .channel-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 4px;
      margin-right: 6px;
      vertical-align: middle;
      white-space: nowrap;
    }

    .tag-algo    { background: #1c2d3a; color: #58a6ff; border: 1px solid #1f6feb; }
    .tag-manual  { background: #1a2d1a; color: #3fb950; border: 1px solid #238636; }
    .tag-general { background: #2d1a1a; color: #f78166; border: 1px solid #6e2626; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-size: 15px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #2d1a1a;
      border: 1px solid #6e2626;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 14px;
      color: #f78166;
    }

    /* ── Section titles ── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 10px;
    }

    /* ── Activity chart ── */
    .activity-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px 10px;
      margin-bottom: 20px;
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 72px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
      position: relative;
    }

    .bar-col:hover .bar-tip { display: block; }

    .bar-seg { width: 100%; }
    .bar-general { background: #f78166; }
    .bar-algo    { background: #58a6ff; }
    .bar-manual  { background: #3fb950; }

    .bar-tip {
      display: none;
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: #1c2d3a;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
      line-height: 1.6;
    }

    .chart-legend {
      display: flex;
      gap: 14px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      align-items: center;
    }

    .legend-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 2px;
      margin-right: 4px;
      vertical-align: middle;
    }

    /* ── Hot topics ── */
    .topic-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 24px;
    }

    .topic-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 8px 3px 10px;
      font-size: 12px;
      transition: border-color 0.15s;
    }

    .topic-tag:hover { border-color: var(--accent); }

    .topic-count {
      background: var(--accent);
      color: #0d1117;
      border-radius: 10px;
      padding: 0 5px;
      font-size: 10px;
      font-weight: 700;
      min-width: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">IMC <span>Prosperity</span> · 策略情报</div>
  <div class="status-bar">
    <span><span class="dot"></span>实时监控中</span>
    <span class="countdown" id="cd">60s</span>
    <span id="last-fetch">—</span>
  </div>
</header>

<main>
  <div class="meta">
    <span>数据来源：IMC Prosperity Discord（<strong>general · algo-trading · manual-trading</strong>）</span>
    <span>刷新间隔：<strong>60 秒</strong></span>
  </div>

  <div class="section-title">频道活跃度（近2小时）</div>
  <div class="activity-wrap">
    <div class="chart-bars" id="activity-chart">
      <div style="color:var(--muted);font-size:12px;align-self:center">加载中…</div>
    </div>
    <div class="chart-legend">
      <span><span class="legend-dot" style="background:#f78166"></span>general</span>
      <span><span class="legend-dot" style="background:#58a6ff"></span>algo-trading</span>
      <span><span class="legend-dot" style="background:#3fb950"></span>manual-trading</span>
      <span style="margin-left:auto;font-variant-numeric:tabular-nums" id="chart-range"></span>
    </div>
  </div>

  <div class="section-title">热点话题</div>
  <div class="topic-tags" id="hot-topics"></div>

  <div class="section-title">策略情报</div>
  <div id="root">
    <div class="empty"><div class="spinner"></div>加载中…</div>
  </div>
</main>

<script>
const RAW_URL      = './insights.md?t=';
const ACTIVITY_URL = './activity.json?t=';

function parseInsights(md) {
  const sections = md.split(/\n---\n/);
  const entries = [];

  for (const sec of sections) {
    const tsMatch = sec.match(/^##\s+(.+)$/m);
    if (!tsMatch) continue;
    const ts = tsMatch[1].trim();
    const bullets = [];
    for (const line of sec.split('\n')) {
      const m = line.match(/^-\s+(.+)$/);
      if (m) bullets.push(m[1].trim());
    }
    if (bullets.length) entries.push({ ts, bullets });
  }

  // newest first
  entries.sort((a, b) => b.ts.localeCompare(a.ts));
  return entries;
}

function tagHtml(text) {
  return text
    .replace(/#algo-trading[:：]?\s*/g,
      '<span class="channel-tag tag-algo">#algo-trading</span>')
    .replace(/#manual-trading[:：]?\s*/g,
      '<span class="channel-tag tag-manual">#manual-trading</span>')
    .replace(/#general[:：]?\s*/g,
      '<span class="channel-tag tag-general">#general</span>');
}

function chicagoNow() {
  return new Date(new Date().toLocaleString('en-US', {timeZone: 'America/Chicago'}));
}

function timeAgo(tsStr) {
  try {
    // Both d and chicagoNow() are parsed as "local" values so the diff is correct
    // regardless of the browser's actual timezone.
    const d = new Date(tsStr.replace(' ', 'T') + ':00');
    const diff = Math.floor((chicagoNow() - d) / 60000);
    if (diff < 1)  return '刚刚';
    if (diff < 60) return `${diff} 分钟前`;
    const h = Math.floor(diff / 60);
    if (h < 24)    return `${h} 小时前`;
    return `${Math.floor(h / 24)} 天前`;
  } catch { return ''; }
}

function render(entries) {
  const root = document.getElementById('root');
  if (!entries.length) {
    root.innerHTML = '<div class="empty">暂无见解记录</div>';
    return;
  }

  root.innerHTML = entries.map(e => `
    <div class="card">
      <div class="card-header">
        <span class="ts">📅 ${e.ts}</span>
        <span class="age">${timeAgo(e.ts)}</span>
      </div>
      <div class="card-body">
        ${e.bullets.map(b => `
          <div class="insight">
            <span class="bullet">›</span>
            <span>${tagHtml(escHtml(b))}</span>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Activity chart ────────────────────────────────────────────────────────────

async function loadActivity() {
  try {
    const res = await fetch(ACTIVITY_URL + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    renderActivityChart(data);
  } catch { /* silently ignore if file not yet available */ }
}

function renderActivityChart(data) {
  const recent = data.slice(-24); // last 2 hours at 5-min intervals
  if (!recent.length) return;

  const maxTotal = Math.max(1, ...recent.map(d =>
    (d.general || 0) + (d.algo || 0) + (d.manual || 0)));

  const chart = document.getElementById('activity-chart');
  chart.innerHTML = recent.map(d => {
    const total = (d.general || 0) + (d.algo || 0) + (d.manual || 0);
    const pct = v => Math.round((v / maxTotal) * 68);
    const hG = pct(d.general || 0);
    const hA = pct(d.algo    || 0);
    const hM = pct(d.manual  || 0);
    const hasData = total > 0;
    return `
      <div class="bar-col">
        <div class="bar-seg bar-manual"  style="height:${hM}px"></div>
        <div class="bar-seg bar-algo"    style="height:${hA}px"></div>
        <div class="bar-seg bar-general" style="height:${Math.max(hasData?2:0,hG)}px"></div>
        <div class="bar-tip">
          ${d.ts.slice(11)} CT<br>
          general <b>${d.general||0}</b> · algo <b>${d.algo||0}</b> · manual <b>${d.manual||0}</b>
        </div>
      </div>`;
  }).join('');

  if (recent.length >= 2) {
    document.getElementById('chart-range').textContent =
      `${recent[0].ts.slice(11)} – ${recent[recent.length-1].ts.slice(11)} CT`;
  }
}

// ── Hot topics ────────────────────────────────────────────────────────────────

const TOPIC_SKIP = new Set([
  'The','This','Round','PnL','DP','No','UTC','And','For','With','Not',
  'Also','But','From','That','Are','Has','Have','When','Been','Will',
  'Can','May','More','Only','Into','Over','Each','Both','All','Any',
]);

function renderHotTopics(entries) {
  const freq = {};
  for (const e of entries) {
    for (const b of e.bullets) {
      const words = b.match(/\b([A-Z][a-zA-Z]{2,})\b/g) || [];
      for (const w of words) {
        if (!TOPIC_SKIP.has(w)) freq[w] = (freq[w] || 0) + 1;
      }
    }
  }
  const topics = Object.entries(freq)
    .filter(([, c]) => c >= 2)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 20);

  const el = document.getElementById('hot-topics');
  if (!topics.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:12px">暂无高频话题</span>';
    return;
  }
  el.innerHTML = topics.map(([w, c]) =>
    `<span class="topic-tag">${w}<span class="topic-count">${c}</span></span>`
  ).join('');
}

async function load() {
  try {
    const res = await fetch(RAW_URL + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const entries = parseInsights(text);
    render(entries);
    renderHotTopics(entries);
    loadActivity();
    document.getElementById('last-fetch').textContent =
      '更新于 ' + new Date().toLocaleTimeString('zh-CN', {timeZone: 'America/Chicago'}) + ' CT';
  } catch (err) {
    document.getElementById('root').innerHTML =
      `<div class="error-box">⚠️ 加载失败：${err.message}<br>
       网络正常的话，几秒后会自动重试。</div>`;
  }
}

// countdown + auto-refresh
let secs = 60;
function tick() {
  secs--;
  document.getElementById('cd').textContent = secs + 's';
  if (secs <= 0) {
    secs = 60;
    load();
  }
}
load();
setInterval(tick, 1000);
</script>
</body>
</html>
